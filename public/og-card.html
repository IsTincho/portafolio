<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; overflow: hidden; }
      body {
        background: #0a0a0b;
        color: #ededec;
        font-family: 'Bricolage Grotesque', sans-serif;
        position: relative;
        padding: 72px 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .grid {
        position: absolute; inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: radial-gradient(ellipse 90% 70% at 80% 10%, #000, transparent 75%);
      }
      .glow {
        position: absolute; top: -180px; right: -120px;
        width: 620px; height: 620px;
        background: radial-gradient(circle, rgba(255,69,58,0.28), transparent 65%);
        filter: blur(40px);
      }
      .top, .mid, .bot { position: relative; z-index: 1; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .brand { display: flex; align-items: center; gap: 6px; font-size: 22px; font-weight: 500; letter-spacing: 0.02em; }
      .brand .cur { width: 11px; height: 24px; background: #ff453a; display: inline-block; }
      .kick { color: #ff453a; font-size: 22px; font-weight: 500; letter-spacing: 0.04em; }
      .name { font-size: 116px; font-weight: 800; letter-spacing: -0.04em; line-height: 0.95; margin-top: 14px; }
      .role { color: #ff453a; }
      .line { font-size: 30px; color: #98989a; margin-top: 26px; max-width: 760px; line-height: 1.35; }
      .line b { color: #ededec; font-weight: 600; }
      .bot { display: flex; align-items: center; gap: 14px; }
      .chip {
        font-family: 'JetBrains Mono', monospace;
        font-size: 19px; color: #98989a;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 100px; padding: 8px 18px;
      }
      .url { margin-left: auto; color: #ff453a; font-family: 'JetBrains Mono', monospace; font-size: 21px; }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div class="glow"></div>

    <div class="top brand mono">ISTINCHO<span class="cur"></span></div>

    <div class="mid">
      <div class="kick mono">// DESARROLLADOR FULL STACK</div>
      <div class="name">IsTincho<span class="role">.</span></div>
      <div class="line">Construyo sistemas que corren en <b>producción.</b> SaaS multi-tenant, pagos, IA aplicada.</div>
    </div>

    <div class="bot">
      <span class="chip">React</span>
      <span class="chip">Node.js</span>
      <span class="chip">MongoDB</span>
      <span class="url">tincho.pages.dev</span>
    </div>
  </body>
</html>
